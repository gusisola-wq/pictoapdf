<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Plataforma CAA</title>
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var repoIdx = parts.indexOf('pictoapdf');
      var base = repoIdx !== -1 ? '/' + parts.slice(0, repoIdx + 1).join('/') + '/' : '/';
      var path = location.pathname.slice(base.length - 1) || '/';
      if (path !== '/') {
        sessionStorage.setItem('opencode-redirect', path + location.search + location.hash);
      }
      location.replace(base);
    })();
  </script>
</head>
<body></body>
</html>
